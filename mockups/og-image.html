<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root{
    --bg:#070B09; --ink:#EAF2EC; --dim:#8CA294;
    --green:#4CAF50; --green-hi:#7BE495;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1200px;height:630px;overflow:hidden;}
  body{background:var(--bg);font-family:'SF Mono','Menlo','Monaco',monospace;position:relative;}
  .glow{position:absolute;right:-160px;top:-180px;width:760px;height:760px;
    background:radial-gradient(circle, rgba(76,175,80,0.16) 0%, rgba(76,175,80,0.05) 45%, transparent 70%);}
  .glow2{position:absolute;left:-220px;bottom:-300px;width:600px;height:600px;
    background:radial-gradient(circle, rgba(76,175,80,0.08) 0%, transparent 65%);}

  .copy{position:absolute;left:72px;top:0;bottom:0;width:640px;display:flex;flex-direction:column;justify-content:center;}
  .brandrow{display:flex;align-items:center;gap:16px;margin-bottom:30px;}
  .brandicon{width:64px;height:64px;border-radius:14px;background:#000;border:1px solid rgba(124,228,149,0.35);
    display:flex;align-items:center;justify-content:center;color:var(--green-hi);font-size:26px;font-weight:700;
    text-shadow:0 0 14px rgba(76,175,80,0.7);}
  .brandname{color:var(--ink);font-size:30px;font-weight:700;}
  .brandname b{color:var(--green-hi);}
  .headline{color:var(--ink);font-size:64px;line-height:1.12;font-weight:700;letter-spacing:-2px;margin-bottom:24px;}
  .headline em{font-style:normal;color:var(--green-hi);text-shadow:0 0 26px rgba(76,175,80,0.5);}
  .sub{color:var(--dim);font-size:26px;line-height:1.5;margin-bottom:34px;max-width:560px;}
  .url{color:var(--green-hi);font-size:24px;}

  .phone{position:absolute;right:64px;top:44px;width:330px;height:715px;border-radius:44px;
    border:2px solid rgba(255,255,255,0.14);overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,0.6), 0 0 60px rgba(76,175,80,0.14);}
  .phone img{width:330px;height:715px;object-fit:cover;object-position:top;display:block;}
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow2"></div>

  <div class="copy">
    <div class="brandrow">
      <div class="brandicon">&gt;_T</div>
      <div class="brandname">Termina<b>LLM</b></div>
    </div>
    <div class="headline">Run a <em>crew</em> of AI coding agents</div>
    <div class="sub">On your own server. From your phone. Any agent, each in its own live terminal.</div>
    <div class="url">terminallm.app</div>
  </div>

  <div class="phone"><img src="shot-swarm.png" alt=""></div>
</body>
</html>
